<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Summer Palette</title>

<style>
*{box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
}

.logo{
display:block;
max-width:220px;
margin:0 auto 6px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#6f7380;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

.close-btn{
position:absolute;
top:32px;
right:32px;
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.25);
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.controls{
position:absolute;
top:32px;
right:84px;
display:flex;
gap:8px;
}

.btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.25);
color:white;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.swipe{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
}

@media (max-width:640px){
.logo{
max-width:180px;
}

.grid{
gap:12px;
}

.tile{
border-radius:18px;
}

.close-btn{
top:28px;
right:28px;
}

.controls{
top:28px;
right:76px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png" alt="Shades of Hue logo">
<h1>True Summer</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<button id="close" class="close-btn">×</button>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>

const groups = [

{
title:"TRUE SUMMER NEUTRALS",
colors:[
"#E6E1E2",
"#D8D0D1",
"#C9C4C8",
"#B2A8AF",
"#8B7D87",
"#DAD8D2",
"#C8C9C9",
"#AEB8BC",
"#8E969D"
]
},

{
title:"COOL YELLOWS",
colors:[
"#F0EEB0",
"#E6E09A",
"#DDD88A"
]
},

{
title:"COOL PINKS",
colors:[
"#F1B6D6",
"#E993C1",
"#D977AE",
"#C75A97",
"#A90C67"
]
},

{
title:"ROSES + BERRIES",
colors:[
"#F06C93",
"#E64F7D",
"#D96796",
"#C45886",
"#B25789",
"#A33E70",
"#8E0E4A"
]
},

{
title:"COOL AQUAS + TEALS",
colors:[
"#8ADDD2",
"#5EBBB0",
"#2D8D7B",
"#0E6A63",
"#157E92",
"#076E7A"
]
},

{
title:"GREENS",
colors:[
"#66D1D0",
"#4AB5A2",
"#2D8C67",
"#0F6A53",
"#004C30"
]
},

{
title:"SOFT BLUE GREYS",
colors:[
"#CDD5E2",
"#A6B6D0",
"#8A97B4",
"#59627B",
"#1E2846",
"#CFDDE6",
"#9AAEB8",
"#607882"
]
},

{
title:"TRUE SUMMER BLUES",
colors:[
"#72C6FB",
"#2B8CD5",
"#62CAE8",
"#2E95BB",
"#0B4E81",
"#A5C8FF",
"#6FB2F1",
"#4C7FD0",
"#1F43BF",
"#01126E"
]
},

{
title:"PERIWINKLES + LAVENDERS",
colors:[
"#BAC5FF",
"#8D98DD",
"#6F73A9",
"#CFCBF0",
"#A5ABE5",
"#3B349B",
"#2E2583"
]
}

];

const grid=document.getElementById("grid");
const lightbox=document.getElementById("lightbox");
const lightboxColor=document.getElementById("lightboxColor");

let all=[];
let index=0;
let startX=0;

groups.forEach(group=>{

const title=document.createElement("div");
title.className="section-title";
title.textContent=group.title;
grid.appendChild(title);

group.colors.forEach(color=>{

all.push(color);

const tile=document.createElement("div");
tile.className="tile";
tile.style.background=color;

tile.onclick=()=>{
index=all.indexOf(color);
open();
};

grid.appendChild(tile);

});

});

function open(){
lightbox.classList.add("show");
render();
}

function render(){
lightboxColor.style.background=all[index];
}

function next(){
index=(index+1)%all.length;
render();
}

function prev(){
index=(index-1+all.length)%all.length;
render();
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show");
document.getElementById("next").onclick=next;
document.getElementById("prev").onclick=prev;

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX;
if(Math.abs(diff)<40)return;
diff<0?next():prev();
});

</script>

</body>
</html>
