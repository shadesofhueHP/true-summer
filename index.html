<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>True Summer Palette</title>

<style>
*{box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
}

.logo{
display:block;
max-width:220px;
margin:0 auto 6px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#6f7380;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{
display:block;
}

.lightbox-color{
position:absolute;
inset:0;
}

.close-btn{
position:absolute;
top:32px;
right:32px;
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.25);
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.controls{
position:absolute;
top:32px;
right:84px;
display:flex;
gap:8px;
}

.btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.25);
color:white;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
cursor:pointer;
}

.swipe{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
}

@media (max-width:640px){
.logo{
max-width:180px;
}

.grid{
gap:12px;
}

.tile{
border-radius:18px;
}

.close-btn{
top:28px;
right:28px;
}

.controls{
top:28px;
right:76px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png" alt="Shades of Hue logo">
<h1>True Summer</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<button id="close" class="close-btn">×</button>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>

const groups = [

{
title:"TRUE SUMMER NEUTRALS",
colors:[
"#E8E3E5",
"#DDD7DA",
"#CEC9CD",
"#BDB5BB",
"#A69CA4",
"#DADAD6",
"#C6CACE",
"#AFB7BE",
"#959EA7"
]
},

{
title:"COOL YELLOWS",
colors:[
"#F2EEB6",
"#EAE4A3",
"#E2DB95",
"#D9D28A"
]
},

{
title:"COOL PINKS",
colors:[
"#F2BEDA",
"#EAA3CB",
"#DC89B9",
"#CB72A7",
"#B85E97"
]
},

{
title:"ROSES + BERRIES",
colors:[
"#EE7FA5",
"#E06490",
"#D57AA6",
"#C96593",
"#BA5A86",
"#A74F78",
"#92506F"
]
},

{
title:"COOL AQUAS + TEALS",
colors:[
"#9ADFD8",
"#72CBC1",
"#4FB2A7",
"#379B98",
"#4BA3B4",
"#2F8EA0"
]
},

{
title:"GREENS",
colors:[
"#73CDC9",
"#57BCAE",
"#46A98C",
"#338C73",
"#5FB79F"
]
},

{
title:"SOFT BLUE GREYS",
colors:[
"#D3DBE6",
"#BAC7DA",
"#A2B1CB",
"#8798B7",
"#6F819F",
"#CFE0E7",
"#AEC0CB",
"#7E97A3"
]
},

{
title:"TRUE SUMMER BLUES",
colors:[
"#89D0FA",
"#59AFE7",
"#7DD4EA",
"#4EB3D1",
"#7AAEED",
"#5D95DD",
"#4F7FCA",
"#6D9FD4",
"#8ABDEB"
]
},

{
title:"PERIWINKLES + LAVENDERS",
colors:[
"#C5CCF7",
"#A8B2EA",
"#8E9AD8",
"#D8D3F2",
"#B8B8E8",
"#9DA3D7",
"#8F89C3"
]
}

];

const grid=document.getElementById("grid");
const lightbox=document.getElementById("lightbox");
const lightboxColor=document.getElementById("lightboxColor");

let all=[];
let index=0;
let startX=0;

groups.forEach(group=>{

const title=document.createElement("div");
title.className="section-title";
title.textContent=group.title;
grid.appendChild(title);

group.colors.forEach(color=>{

all.push(color);

const tile=document.createElement("div");
tile.className="tile";
tile.style.background=color;

tile.onclick=()=>{
index=all.indexOf(color);
open();
};

grid.appendChild(tile);

});

});

function open(){
lightbox.classList.add("show");
render();
}

function render(){
lightboxColor.style.background=all[index];
}

function next(){
index=(index+1)%all.length;
render();
}

function prev(){
index=(index-1+all.length)%all.length;
render();
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show");
document.getElementById("next").onclick=next;
document.getElementById("prev").onclick=prev;

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX;
if(Math.abs(diff)<40)return;
diff<0?next():prev();
});

</script>

</body>
</html>
