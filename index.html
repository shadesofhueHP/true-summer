<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soft Summer Palette</title>

<style>
*{box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#f5f2f1;
}

.container{
max-width:900px;
margin:auto;
padding:8px 16px 16px;
}

.header{
text-align:center;
margin-bottom:8px;
}

.logo{
display:block;
max-width:220px;
margin:0 auto 6px;
}

.header h1{
font-family:Georgia,serif;
font-weight:500;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.section-title{
grid-column:1/-1;
font-size:12px;
letter-spacing:.15em;
color:#7a6f72;
margin-top:14px;
}

.tile{
aspect-ratio:1;
border-radius:20px;
cursor:pointer;
}

.lightbox{
position:fixed;
inset:0;
display:none;
z-index:999;
}

.lightbox.show{display:block;}

.lightbox-color{
position:absolute;
inset:0;
}

.close-btn{
position:absolute;
top:32px;
right:32px;
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.25);
color:white;
font-size:22px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
}

.controls{
position:absolute;
top:32px;
right:84px;
display:flex;
gap:8px;
}

.btn{
width:36px;
height:36px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.25);
color:white;
font-size:16px;
display:flex;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
}

.swipe{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
color:white;
letter-spacing:.15em;
font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img class="logo" src="logo.png">
<h1>Soft Summer</h1>
<div>Tap color • Swipe to browse</div>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="lightbox" class="lightbox">
<div id="lightboxColor" class="lightbox-color"></div>

<button id="close" class="close-btn">×</button>

<div class="controls">
<button id="prev" class="btn">←</button>
<button id="next" class="btn">→</button>
</div>

<div class="swipe">SWIPE</div>
</div>

<script>

const groups = [

{
title:"COOL GREYS + TAUPES",
colors:[
"#A9A6B1","#B8AFB1","#CBC4C7",
"#AA9D9F","#BFB6B8","#CFC8CB",
"#D3CCC3","#C9C1B6","#D8D0C6"
]
},

{
title:"SOFT BLUES",
colors:[
"#ABC4D0","#9FBBCB","#86AFC6",
"#729ABB","#6C95B6","#5F8FB8",
"#8798B0","#7E8FA8","#6881A0"
]
},

{
title:"BLUE GREYS",
colors:[
"#9CA8B7","#8795A8","#7389A5",
"#8FA1B4","#AEBBC9"
]
},

{
title:"SOFT TEALS",
colors:[
"#A5CAC6","#94B9B8","#82B1AA",
"#6E9FA5","#7FAEA3","#8FB9B5"
]
},

{
title:"SOFT SAGES",
colors:[
"#A7B59E","#9DB890","#8FAA95",
"#94A98F","#9FB29B","#A8BBA3"
]
},

{
title:"PERIWINKLES",
colors:[
"#AFAFC2","#9A9CBD","#8897BB",
"#8A8CB0","#9AA3C3","#B2B3CD"
]
},

{
title:"LAVENDERS + MAUVES",
colors:[
"#B8A2C6","#A789B3","#9E98BB",
"#8A82A5","#A58DB8","#B086B1"
]
},

{
title:"SOFT ROSES",
colors:[
"#C97787","#CF8092","#D697A5",
"#D78C9D","#C48999","#B57383"
]
},

{
title:"BLUSH PINKS",
colors:[
"#E5B4C0","#E9BDC7","#E7B9C7",
"#EFC7D0","#DFA0B3","#D7A4AD"
]
},

{
title:"SOFT BERRIES",
colors:[
"#AE446E","#A24A78","#91556A",
"#B5657A","#9F627C","#8C5972"
]
},

{
title:"SOFT SUMMER YELLOWS",
colors:[
"#E1DEA2","#DDD3AA","#D8D39A",
"#D6CF9A","#E2D4A5","#E6D9B0"
]
}

];

const grid=document.getElementById("grid")
const lightbox=document.getElementById("lightbox")
const lightboxColor=document.getElementById("lightboxColor")

let all=[]
let index=0
let startX=0

groups.forEach(group=>{

const title=document.createElement("div")
title.className="section-title"
title.textContent=group.title
grid.appendChild(title)

group.colors.forEach(color=>{

all.push(color)

const tile=document.createElement("div")
tile.className="tile"
tile.style.background=color

tile.onclick=()=>{
index=all.indexOf(color)
open()
}

grid.appendChild(tile)

})

})

function open(){
lightbox.classList.add("show")
render()
}

function render(){
lightboxColor.style.background=all[index]
}

function next(){
index=(index+1)%all.length
render()
}

function prev(){
index=(index-1+all.length)%all.length
render()
}

document.getElementById("close").onclick=()=>lightbox.classList.remove("show")
document.getElementById("next").onclick=next
document.getElementById("prev").onclick=prev

lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX
})

lightbox.addEventListener("touchend",e=>{
let diff=e.changedTouches[0].clientX-startX
if(Math.abs(diff)<40)return
diff<0?next():prev()
})

</script>

</body>
</html>
